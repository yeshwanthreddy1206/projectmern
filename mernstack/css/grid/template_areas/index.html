<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gride Template Areas</Template></title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            height: 100%;
        }
        .container{
            width: 100%;
            height: 100vh;
            background-color: bisque;
            display: grid;
            padding: 1rem;
            gap: 1rem;
            grid-template-areas: 
            "header header header"
            "sidebar content1 content1"
            "sidebar content2 content3"
            "footer footer footer";
        }
        .item{
            background-color: brown;
            border: 2px solid black;
            
        }
        #Header{
            grid-area: header;
        }
         #sideBar{
            grid-area: sidebar;
        }
         #content1{
            grid-area: content1;
        }
         #content2{
            grid-area: content2;
        }
         #content3{
            grid-area: content3;
        }
         #footer{
            grid-area: footer;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="Header">Header</div>
        <div class="item" id="sideBar">Side Bar</div>
        <div class="item" id="content1">content 1</div>
        <div class="item" id="content2">content 2</div>
        <div class="item" id="content3">content 3</div>
        <div class="item" id="footer">footer</div>
    </div>
</body>
</html>
