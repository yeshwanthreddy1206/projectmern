<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            height: 100%;
        }
        .item{
            height: 150px;
            width: 150px;
            background-color: blue;
            border: 2px solid white;
        }
        .container{
            background-color: black;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* perspective: 800px; */
            gap: 1rem;
        }
        #rotateX:hover{
            transform: perspective(800px) rotateX(80deg);
        }
        #rotateY:hover{
            transform: perspective(800px) rotateY(45deg);
        }
         #rotateZ:hover{
            transform: perspective(800px) rotateZ(45deg);
        }
         #translateX:hover{
            transform: translateX(-50px);
        }
         #translateY:hover{
            transform: translateY(50px);
        }
         #translateZ:hover{
            transform: translateZ(50px);
        }
        #scaleX:hover{
            transform: scaleX(1.5)
        }
        #scaleY:hover{
            transform: scaleY(1.5)
        }
        #scaleZ:hover{
            transform: perspective(800px) scaleZ(5) rotateY(45deg)
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="rotateX">RotateX</div>
        <div class="item"id="rotateY">RotateY</div>
        <div class="item"id="rotateZ">RotateZ</div>
        <div class="item"id="translateX">translateX</div>
        <div class="item"id="translateY">translatey</div>
        <div class="item"id="translateZ">translatez</div>
        <div class="item"id="scaleX">scalex</div>
        <div class="item"id="scaleY">scaley</div>
        <div class="item"id="scaleZ">scalez</div>
    </div>
</body>
</html>
