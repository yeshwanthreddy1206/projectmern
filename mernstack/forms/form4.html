<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h2>Job Application</h2>
        <label for="Name">Name:</label>
        <input type="text" name="Name">
        <br>
        <br>
         <label for="Email">Email Id:</label>
        <input type="email" name="Email">
        <br>
        <br>
        <label for="Tel">Mobile Number:</label>
        <input type="tel" name="Tel">
        <br>
        <br>
        <label for="fileupload"> Resume:</label>
        <input type="file" name="fileupload" id="fileupload">
        <br>
        <br>
        <label for="counter">Experience(in years):</label>
        <input type="number" name="counter" min="0" max="50">

        <fieldset>
            <legend>Skills:</legend>
            <label for="checkbox1">HTML</label>
            <input type="checkbox" name="checkbox1" id="checkbox1">
            <br>
            <br>
            <label for="checkbox2">CSS</label>
            <input type="checkbox" name="checkbox2" id="checkbox2">
            <br>
            <br>
            <label for="checkbox3">Java Script</label>
            <input type="checkbox" name="checkbox3" id="checkbox3">
            <br>
        </fieldset>
        <br>
          <label for="Highest Education:">What is your Qualification:</label>
          <br>
       <select name="Qualification" id="Qualification">
        <option value="High school">High school</option>
        <option value="Associate's degree">Associate's degree</option>
        <option value="Bachelor's Degree">Bachelor's Degree</option>
        <option value="Master's Degree">Master's Degree</option>
        <option value="PHD">PHD</option>
       </select>
       <br>
       <fieldset>
        <legend>Availability:</legend>
        
         <label for="Radio1">Full-time</label>
         <input type="radio" name="radio" id="Radio1">
         <br>    
        <label for="Radio2">Part-time</label>
         <input type="radio"  name="radio" id="Radio2" >
         <br>
    </fieldset>
         <label for="Textarea"> Comments:</label>
         <br>
         <textarea name="Textarea" id="Textarea" cols="30" rows="10"></textarea>
         <button>submit Application</button> 
    </form>
</body>
</html>
